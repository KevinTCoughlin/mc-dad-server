version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - gocritic
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - staticcheck
    - unused

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unexported-return
          severity: warning

  exclusions:
    presets: []

formatters:
  enable:
    - gofumpt
